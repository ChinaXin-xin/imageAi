server:
  port: 8080
spring:
  application:
    name: ImageAI
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:33306/image_ai_original?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
    username: root
    password: 123456
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 80MB
    
image-ai:
  cli-proxy:
    base-url: http://43.160.192.2:8317
    management-key: mgmt-7508074bf946346ac147485423j5hs
  gpt:
    base-url: ${IMAGE_AI_GPT_BASE_URL:http://43.160.192.2:8317}
    api-key: ${IMAGE_AI_GPT_API_KEY:}
    model: ${IMAGE_AI_GPT_MODEL:gpt-5.5}
  image-generation:
    model: ${IMAGE_AI_IMAGE_MODEL:gpt-image-2}
    max-task-concurrency: ${IMAGE_AI_MAX_TASK_CONCURRENCY:4}
    max-images-per-task: ${IMAGE_AI_MAX_IMAGES_PER_TASK:10}
    max-global-image-concurrency: ${IMAGE_AI_MAX_GLOBAL_IMAGE_CONCURRENCY:10}
